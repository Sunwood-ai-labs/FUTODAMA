version: "3.8"

services:
  webtop:
    build: .
    container_name: futodama
    env_file:
      - .env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Tokyo
      - CUSTOM_USER=user
      - PASSWORD=strong-pass
      # Claude Code -> GLM (z.ai Anthropic-compatible API) settings
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL}
      # Optional: autostart a Python script inside the container on boot
      # - PYTHON_AUTOSTART_ENABLE=1
      # - PYTHON_AUTOSTART_SCRIPT=/config/startup/my_script.py
      # - PYTHON_AUTOSTART_CWD=/config/startup
      # - PYTHON_AUTOSTART_PYTHON=python3
      # - PYTHON_AUTOSTART_DELAY_SEC=5
      # Optional: enable persisted s6 services from /config/s6-services (default on)
      # - S6_USER_SERVICES_ENABLE=1
      # - S6_USER_SERVICES_DIR=/config/s6-services
    volumes:
      - ./futodama-config:/config
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:3333:3001"
      - "127.0.0.1:2222:22"
    shm_size: "1gb"
    restart: unless-stopped
    ulimits:
      core: 0
